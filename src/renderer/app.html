<!doctype html>
<html lang="ru" data-theme="dark-classic">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'; connect-src 'self';">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SproutG</title>
  <link rel="stylesheet" href="./app.css" />
</head>
<body>
  <div class="topbar" id="topbar">
    <div class="drag topbar__left">
      <img class="appicon" src="../../assets/icon.png" alt="SproutG" />
      <div class="apptitle">SproutG</div>
      <button class="tbbtn tbbtnIcon tbbtnHome" id="btnHome" title="Домой: выбор O1 или MCC" aria-label="Домой">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M3.5 11.5 12 4l8.5 7.5"/><path d="M5.5 10.5V20h13v-9.5"/><path d="M9.5 20v-5h5v5"/></svg>
        <span class="srOnly">Домой</span>
      </button>
      <div class="bridgeBadge" id="bridgeBadge" title="Статус подключения к Google Таблице">
        <span class="bridgeBadge__label">Статус:</span>
        <span class="bridgeBadge__mark" aria-hidden="true">...</span>
      </div>
    </div>
    <div class="drag topbar__center"></div>
    <div class="topbar__right">
      <button class="tbbtn tbbtnIcon" id="btnCompany" title="Компании" aria-label="Компании">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 21V6.5A2.5 2.5 0 0 1 6.5 4h7A2.5 2.5 0 0 1 16 6.5V21"/><path d="M16 9h1.5A2.5 2.5 0 0 1 20 11.5V21"/><path d="M8 8h4M8 12h4M8 16h4M3 21h18"/></svg>
        <span class="srOnly">Компании</span>
      </button>
      <button class="tbbtn tbbtnIcon" id="btnStats" title="Статистика" aria-label="Статистика">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M4 20h16"/><path d="M7 16V9"/><path d="M12 16V5"/><path d="M17 16v-4"/></svg>
        <span class="srOnly">Статистика</span>
      </button>
      <button class="tbbtn tbbtnIcon" id="btnSettings" title="Настройки" aria-label="Настройки">
        <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 8.5a3.5 3.5 0 1 1 0 7 3.5 3.5 0 0 1 0-7Z"/><path d="M19 12a7.5 7.5 0 0 0-.1-1.2l2-1.5-2-3.4-2.4 1a7.3 7.3 0 0 0-2-1.2L14.2 3h-4.4l-.4 2.7a7.3 7.3 0 0 0-2 1.2l-2.4-1-2 3.4 2 1.5A7.5 7.5 0 0 0 5 12c0 .4 0 .8.1 1.2l-2 1.5 2 3.4 2.4-1a7.3 7.3 0 0 0 2 1.2l.4 2.7h4.4l.4-2.7a7.3 7.3 0 0 0 2-1.2l2.4 1 2-3.4-2-1.5c.1-.4.1-.8.1-1.2Z"/></svg>
        <span class="srOnly">Настройки</span>
      </button>
      <div class="winbtns">
        <button class="winbtn" id="btnMin" title="Свернуть">-</button>
        <button class="winbtn" id="btnMax" title="Развернуть">□</button>
        <button class="winbtn winbtn--close" id="btnClose" title="Закрыть">×</button>
      </div>
    </div>
  </div>
  <main id="sproutgAppRoot">
<div id="pageSelector" class="pageSelector hidden">
    <div class="selectorCard">
      <h2>Выберите раздел</h2>
      <p>Откройте O1 или MCC. Компании доступны в верхней панели.</p>
      <div class="selectorBtns">
        <button class="btn btnPrimary" onclick="choosePage('O1')">O1</button>
        <button class="btn" onclick="choosePage('MCC')">MCC</button>
      </div>
    </div>
  </div>

  <div id="pageO1" class="pageRoot">
    <div class="fixedHeader" id="fixedHeaderO1">
      <div class="fixedHeaderInner">

        <div class="fhTop">
          <div class="fhMeta" id="fhMeta"></div>

          <div class="fhRight">
            <div class="profilePill" id="profilePill" title="Копировать название профиля">—</div>
            <div class="banText" id="banText" style="display:none;"></div>
            <div class="deletedText" id="deletedText" style="display:none;"></div>
            <button id="btnEdit" class="btn btnPrimary" onclick="toggleEdit()" disabled>Редактировать</button>
          </div>
        </div>

        <div class="navLine">
          <div class="navStage" id="navStage" style="display:none;">
            Открыто из: <b id="navStageText">—</b>
          </div>

          <div class="navRight">
            <span class="badge countBadge" id="countLeft" style="display:none;">0</span>
            <button id="btnPrev" class="btn" onclick="navPrev()" disabled>←</button>
            <span class="badge" id="countMid" style="display:none;">0 / 0</span>
            <button id="btnNext" class="btn" onclick="navNext()" disabled>→</button>
            <span class="badge countBadge" id="countRight" style="display:none;">0</span>
          </div>
        </div>

        <div class="tabsWrap">
          <button class="tabsArrow" onclick="scrollTabs(-1)" title="Влево">‹</button>
          <div class="tabsBar" id="tabsBar"></div>
          <button class="tabsArrow" onclick="scrollTabs(1)" title="Вправо">›</button>
        </div>

      </div>
    </div>

    <div id="mainScrollO1">
      <div class="wrap">

        <div class="panel pageSwitchPanel">
          <div class="row">
            <select id="pageSwitchO1" class="pageSwitch" aria-label="Переключение страницы">
              <option value="O1">O1</option>
              <option value="MCC">MCC</option>
            </select>
          </div>
        </div>

        <div class="panel">
          <h3>Поиск</h3>
          <div class="row">
            <input id="profile" class="half" type="text" placeholder="Название профиля"/>
            <button class="btn btnPrimary" onclick="search()">Найти</button>
          </div>
          <div id="err" class="err"></div>
        </div>

        <div class="panel panelCollapsible" data-panel-key="FarmA.ui.O1.panel.filters.collapsed">
          <div class="panelHeader" data-panel-header>
            <h3>Фильтры</h3>
            <span class="panelCaret">▾</span>
          </div>

          <div class="panelBody">
            <div class="filtersGrid">
            <div class="miniPanel">
              <div class="row" style="margin-top:0;">
                <select id="fltGroup" class="w220">
                  <option value="Ads Видео">Ads Видео</option>
                  <option value="Аккаунт">Аккаунт</option>
                  <option value="Платежка">Платежка</option>
                  <option value="Речек">Речек</option>
                  <option value="РК">РК</option>
                </select>

                <input id="fltDate" type="date" class="w220"/>
                <button class="btn" onclick="runFilter()">Показать</button>
                <button class="btn" onclick="clearFilter()">Сброс</button>

                <input id="fltText" type="text" class="half" placeholder="Поиск в результатах"/>
              </div>

              <div class="list" id="fltList"></div>
            </div>

            <div class="miniPanel">
              <div class="workFilterRow">
                <div class="workFilterDates">
                  <input id="workFrom" type="date" class="dateCompact" placeholder="От"/>
                  <input id="workTo" type="date" class="dateCompact" placeholder="До"/>
                </div>
                <div class="workFilterBtns">
                  <button class="btn btnPrimary" onclick="loadWork('today')">Сегодня</button>
                  <button class="btn" onclick="loadWork('overdue')">Просрочено</button>
                  <button class="btn" onclick="loadWork('new')">Новые</button>
                  <button class="btn" onclick="loadWork('verify')">Верификации</button>
                  <button class="btn" onclick="loadWork('review')">На рассмотрении</button>
                  <button class="btn" onclick="loadWork('nospend')">Без расхода</button>
                  <button class="btn" onclick="loadWork('c1')">С1</button>
                  <button class="btn" onclick="loadWork('cleanup')">Очистка профилей</button>
                </div>
              </div>

              <div class="list workListTall" id="workList"></div>
            </div>
            </div>
          </div>
        </div>

        <div class="panel">
          <h3>Профиль</h3>
          <div class="row" style="margin-top:0;">
            <button id="btnDeleted" class="btn btnPrimary" onclick="toggleDeleted()" disabled>Профиль удален</button>
            <button id="btnSync" class="btn" onclick="syncProfile()" disabled>Синхронизировать</button>
          </div>
        </div>

        <div id="out"></div>

      </div>
    </div>
  </div>

  <div id="pageMcc" class="pageRoot">
    <div class="fixedHeader" id="fixedHeaderMcc">
      <div class="fixedHeaderInner">
        <div class="fhTop">
          <div class="fhMeta" id="mccMeta"></div>

          <div id="mccProfileTabsWrap" class="mccHeaderSelectWrap">
            <select id="mccProfileTabsSelect" class="mccProfileTabsSelect" aria-label="MCC вкладки профилей"></select>
          </div>

          <div class="fhRight">
            <div class="profilePill" id="mccProfilePill" title="Копировать название профиля">—</div>
            <button id="mccBtnEdit" class="btn btnPrimary" onclick="toggleMccEdit()" disabled>Редактировать</button>
          </div>
        </div>

        <div class="navLine">
          <div class="navStage" id="mccNavStage">
            Аккаунт: <b id="mccNavAccount">—</b>
          </div>

          <div class="navRight">
            <span class="badge" id="mccNavCount" style="display:none;">0 / 0</span>
            <button id="mccPrev" class="btn" onclick="mccNavPrev()" disabled>←</button>
            <button id="mccNext" class="btn" onclick="mccNavNext()" disabled>→</button>
          </div>
        </div>

        <div class="tabsWrap">
          <button class="tabsArrow" onclick="scrollMccTabs(-1)" title="Влево">‹</button>
          <div class="tabsBar" id="mccAccountTabs"></div>
          <button class="tabsArrow" onclick="scrollMccTabs(1)" title="Вправо">›</button>
        </div>
      </div>
    </div>

    <div id="mainScrollMcc">
      <div class="wrap">
        <div class="panel pageSwitchPanel">
          <div class="row">
            <select id="pageSwitchMcc" class="pageSwitch" aria-label="Переключение страницы">
              <option value="O1">O1</option>
              <option value="MCC">MCC</option>
            </select>
          </div>
        </div>
        <div class="panel">
          <h3>MCC</h3>
          <div class="row">
            <input id="mccProfileInput" class="half" type="text" placeholder="Название профиля MCC"/>
            <button class="btn btnPrimary" onclick="mccSearch()">Найти</button>
          </div>
          <div id="mccErr" class="err"></div>
        </div>

        <div class="panel panelCollapsible" data-panel-key="FarmA.ui.MCC.panel.filters.collapsed">
          <div class="panelHeader" data-panel-header>
            <h3>Фильтры</h3>
            <span class="panelCaret">▾</span>
          </div>
          <div class="panelBody">
            <div class="filtersGrid">
            <div class="miniPanel">
              <div class="row" style="margin-top:0;">
                <select id="mccStageFilter" class="w220">
                  <option value="D">MCC</option>
                  <option value="T">Верификация</option>
                  <option value="W">Речек</option>
                </select>
                <input id="mccStageFrom" type="date" class="w220"/>
                <input id="mccStageTo" type="date" class="w220"/>
                <button class="btn" onclick="mccApplyStageFilter()">Показать</button>
                <button class="btn" onclick="mccClearStageFilter()">Сброс</button>
              </div>
              <div class="list" id="mccStageFilterList"></div>
            </div>

            <div class="miniPanel">
              <div class="row" style="margin-top:0;">
                <button class="btn btnPrimary" onclick="mccLoadWorkFilter('inwork')">В работе</button>
                <button class="btn" onclick="mccLoadWorkFilter('review')">На рассмотрении</button>
                <button class="btn" onclick="mccLoadWorkFilter('nospend')">Без расхода</button>
                <button class="btn" onclick="mccLoadWorkFilter('active')">Актуальные</button>
                <button class="btn" onclick="mccLoadWorkFilter('clear')">Сброс</button>
              </div>
              <div class="list" id="mccWorkFilterList"></div>
            </div>
            </div>
            <div id="mccFilterErr" class="err"></div>
          </div>
        </div>

        <div class="panel panelCollapsible" data-panel-key="FarmA.ui.MCC.panel.allmcc.collapsed">
          <div class="panelHeader" data-panel-header>
            <h3>Все MCC</h3>
            <span class="panelCaret">▾</span>
          </div>
          <div class="panelBody">
            <div class="row" style="margin-top:0;">
              <button class="btn" onclick="loadMccOverview()">Обновить</button>
            </div>
            <div id="mccOverviewList" class="list workListTall"></div>
          </div>
        </div>

        <div class="panel">
          <h3>Профиль</h3>
          <div class="row" style="margin-top:0;">
            <button id="mccBtnDeleted" class="btn btnPrimary" onclick="mccToggleDeleted()" disabled>Профиль удален</button>
            <button id="mccBtnSync" class="btn" onclick="mccSyncProfile()" disabled>Синхронизировать</button>
          </div>
        </div>

        <div id="mccOut"></div>
      </div>
    </div>
  </div>

  <div id="pageCompany" class="pageRoot">
    <div class="fixedHeader" id="fixedHeaderCompany">
      <div class="fixedHeaderInner">
        <div class="fhTop">
          <div class="fhMeta" id="companyMeta"></div>
        </div>
      </div>
    </div>
    <div id="mainScrollCompany">
      <div class="wrap">
        <div class="panel">
          <h3>Компании</h3>
          <div class="row" style="margin-top:0;">
            <button class="btn btnPrimary" id="companyAddBtn" type="button">Добавить компанию</button>
          </div>
          <div id="companyFormWrap" style="display:none;margin-top:12px;">
            <div id="companyFormGrid" class="companyFormGrid"></div>
            <div class="row" style="margin-top:12px;">
              <button class="btn btnPrimary" id="companySubmitBtn" type="button">Готово</button>
            </div>
          </div>
          <div id="companyErr" class="err"></div>
        </div>
      </div>
    </div>
  </div>

  <div id="toast" class="toast"></div>
  <button id="o1SyncLeft" class="btn sideSyncBtn hidden" type="button" title="Синхронизировать">С</button>
  <button id="mccSyncLeft" class="btn sideSyncBtn hidden" type="button" title="Синхронизировать">С</button>
  <div id="o1TopCluster" class="o1TopCluster">
    <button id="o1ToTop" class="btn o1TopBtn" type="button" title="В начало">↑</button>
  </div>
  <div id="mccBottomBar" class="mccBottomBar">
    <div id="mccTopCluster" class="mccTopCluster">
      <button id="mccToTop" class="btn mccTopBtn" type="button" title="В начало">↑</button>
      <button id="mccToVerification" class="btn mccTopBtn" type="button" title="К Верификациям">В</button>
      <button id="mccToRechek" class="btn mccTopBtn" type="button" title="К Речекам">Р</button>
    </div>
  </div>
  </main>
  <div class="apiLoading" id="apiLoading" aria-live="polite">
    <span class="apiSpinner"></span>
    <span>Синхронизация</span>
  </div>
  <script src="./core/api.js"></script>
  <script src="./app.js"></script>
</body>
</html>
