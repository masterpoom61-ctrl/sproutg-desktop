<!doctype html>
<meta charset="utf-8">
<title>League icons preview</title>
<link rel="stylesheet" href="league-icons.css">
<style>
  body { margin: 0; min-height: 100vh; display: grid; place-items: center; background: #121b3a; font-family: Inter, Arial, sans-serif; color: #eaf0ff; }
  .wrap { display: grid; grid-template-columns: repeat(6, 120px); gap: 20px; padding: 28px; border-radius: 28px; background: rgba(255,255,255,.055); border: 1px solid rgba(255,255,255,.12); }
  .item { display: grid; justify-items: center; gap: 10px; font-weight: 800; font-size: 13px; opacity: .95; }
</style>
<div class="wrap">
  <div class="item"><span class="leagueBadge league--none"><span class="leagueMaskIcon"></span></span><span>NONE</span></div>
  <div class="item"><span class="leagueBadge league--bronze"><span class="leagueMaskIcon"></span></span><span>BRONZE</span></div>
  <div class="item"><span class="leagueBadge league--silver"><span class="leagueMaskIcon"></span></span><span>SILVER</span></div>
  <div class="item"><span class="leagueBadge league--gold"><span class="leagueMaskIcon"></span></span><span>GOLD</span></div>
  <div class="item"><span class="leagueBadge league--diamond"><span class="leagueMaskIcon"></span></span><span>DIAMOND</span></div>
  <div class="item"><span class="leagueBadge league--legendary"><span class="leagueMaskIcon"></span></span><span>LEGENDARY</span></div>
</div>
