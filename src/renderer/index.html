<!doctype html>
<html lang="ru" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data:; style-src 'self' 'unsafe-inline'; script-src 'self';">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SproutG</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="topbar" id="topbar">
    <div class="drag topbar__left">
      <img class="appicon" src="../../assets/icon.png" alt="SproutG" />
      <div class="apptitle">SproutG</div>
</div>
    <div class="drag topbar__center"></div>
    <div class="topbar__right">
      <button class="tbbtn" id="btnStats" title="Статистика">Статистика</button>
      <button class="tbbtn" id="btnSettings" title="Настройки">Настройки</button>
      <div class="winbtns">
        <button class="winbtn" id="btnMin" title="Свернуть">—</button>
        <button class="winbtn" id="btnMax" title="Развернуть">▢</button>
        <button class="winbtn winbtn--close" id="btnClose" title="Закрыть">×</button>
      </div>
    </div>
  </div>
  <div class="contentShadow"></div>
  <script src="./renderer.js"></script>
</body>
</html>
